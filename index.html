<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regalos de Boda</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="card">
    <!-- Header -->
    <div class="card-header">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="8" width="18" height="4" rx="1" ry="1"/>
          <path d="M12 8v13"/>
          <path d="M19 12v7a2 2 0 01-2 2H7a2 2 0 01-2-2v-7"/>
          <path d="M7.5 8a2.5 2.5 0 010-5A4.8 8 0 0112 8a4.8 8 0 014.5-5 2.5 2.5 0 010 5"/>
        </svg>
      </div>
      <h2>Regalos</h2>
      <p class="font-script">Tu presencia es el mejor regalo</p>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <svg viewBox="0 0 24 24" fill="hsl(36, 45%, 70%)" stroke="hsl(36, 55%, 45%)" stroke-width="1.5">
        <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
      </svg>
      <div class="divider-line"></div>
    </div>

    <!-- Options -->
    <div class="options">
      <!-- Option 1: Mesa de Regalos -->
      <div class="option">
        <div class="option-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
          </svg>
        </div>
        <div class="option-content">
          <h3>Mesa de Regalos</h3>
          <p>Si prefieres elegir algo de nuestra lista seleccionada.</p>
          <a href="https://www.amazon.com" target="_blank" rel="noopener noreferrer" class="btn-gold">
            Ir a la Tienda
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </a>
        </div>
      </div>

      <!-- Option 2: Aportación -->
      <div class="option">
        <div class="option-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 8l4-4h10l4 4"/>
            <path d="M3 8v10a2 2 0 002 2h14a2 2 0 002-2V8"/>
            <path d="M3 8h18"/>
            <path d="M12 11.5c-.5-.5-1.5-1-2.5 0s0 2.5 2.5 4c2.5-1.5 3.5-3 2.5-4s-2-.5-2.5 0z"/>
          </svg>
        </div>
        <div class="option-content">
          <h3>Aportación</h3>
          <p>Si deseas apoyarnos con un detalle en efectivo.</p>
          <a href="https://cuentapro11.github.io/numeroo/" class="btn-gold">
            Ver Datos Bancarios
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
              <line x1="1" y1="10" x2="23" y2="10"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      <p class="font-script">Con amor, gracias por ser parte de este día ✨</p>
    </div>
  </div>

  <script src="jave.ts"></script>
</body>
</html>
